<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calque — atelier d'images</title>
  <style>
    :root { --bg:#1a1714; --panel:#262019; --ink:#efe7da; --accent:#c8a25b; --muted:#8a7e6d; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, sans-serif; background:var(--bg); color:var(--ink); }
    header { padding:1.5rem 2rem; border-bottom:1px solid #3a2f24; }
    header h1 { margin:0; font-weight:600; letter-spacing:.04em; }
    header p { margin:.25rem 0 0; color:var(--muted); font-size:.9rem; }
    main { display:grid; grid-template-columns: 320px 1fr; gap:1.5rem; padding:1.5rem 2rem; }
    .panel { background:var(--panel); border:1px solid #3a2f24; border-radius:10px; padding:1.25rem; }
    label { display:block; font-size:.8rem; color:var(--muted); margin:.9rem 0 .3rem; }
    select, input[type=range], input[type=file] { width:100%; }
    button { margin-top:1.25rem; width:100%; padding:.7rem; background:var(--accent); color:#1a1714;
      border:none; border-radius:8px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    .stage { display:flex; align-items:center; justify-content:center; min-height:60vh;
      border:1px dashed #3a2f24; border-radius:10px; background:#15120f; }
    .stage img { max-width:100%; max-height:75vh; border-radius:6px; }
    .row { display:flex; justify-content:space-between; font-size:.75rem; color:var(--muted); }
    a.dl { display:none; margin-top:1rem; text-align:center; color:var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Calque</h1>
    <p>Style posé sur la structure — watercolor · lithograph · anime</p>
  </header>
  <main>
    <section class="panel">
      <label>Image source</label>
      <input id="file" type="file" accept="image/*" />

      <label>Style</label>
      <select id="style">
        <option value="watercolor">Aquarelle (watercolor)</option>
        <option value="lithograph">Lithographie</option>
        <option value="anime">Anime / cel</option>
      </select>

      <div id="params"></div>

      <button id="go" disabled>Appliquer</button>
      <a id="dl" class="dl" download="calque.png">Télécharger le résultat</a>
    </section>
    <section class="stage"><div id="placeholder" style="color:var(--muted)">Charge une image pour commencer</div></section>
  </main>

  <script>
    const PARAMS = {
      watercolor: [
        ["paper_transparency", "Transparence papier", 0, 1, 0.5, 0.05],
        ["wash_intensity", "Intensité des lavis", 0, 1, 0.7, 0.05],
        ["dark_edges", "Bords sombres", 0, 1, 0.6, 0.05],
        ["flow_amount", "Coulures", 0, 1, 0.5, 0.05],
      ],
      lithograph: [
        ["contrast", "Contraste", 1, 3, 1.5, 0.1],
        ["threshold", "Seuil", 0, 255, 128, 1],
        ["halftone_size", "Trame (pts)", 0, 10, 4, 1],
        ["grain_amount", "Grain", 0, 1, 0.1, 0.05],
      ],
      anime: [
        ["edge_thickness", "Épaisseur trait", 0, 5, 2, 1],
        ["edge_darkness", "Noirceur trait", 0, 1, 0.8, 0.05],
        ["color_levels", "Niveaux couleur", 2, 16, 8, 1],
        ["saturation", "Saturation", 0.5, 2, 1.2, 0.05],
      ],
    };

    const $ = (id) => document.getElementById(id);
    const stage = document.querySelector(".stage");

    function renderParams() {
      const style = $("style").value;
      $("params").innerHTML = PARAMS[style]
        .map(([k, lbl, min, max, def, step]) =>
          `<label>${lbl} <span class="row"><span></span><span id="v_${k}">${def}</span></span></label>
           <input type="range" id="p_${k}" min="${min}" max="${max}" step="${step}" value="${def}"
                  oninput="document.getElementById('v_${k}').textContent=this.value">`)
        .join("");
    }

    $("style").addEventListener("change", renderParams);
    $("file").addEventListener("change", () => { $("go").disabled = !$("file").files.length; });

    $("go").addEventListener("click", async () => {
      const style = $("style").value;
      const fd = new FormData();
      fd.append("image", $("file").files[0]);
      for (const [k] of PARAMS[style]) fd.append(k, $(`p_${k}`).value);

      $("go").disabled = true; $("go").textContent = "Traitement…";
      try {
        const res = await fetch(`/api/effect/${style}`, { method: "POST", body: fd });
        if (!res.ok) throw new Error(await res.text());
        const url = URL.createObjectURL(await res.blob());
        stage.innerHTML = `<img src="${url}" alt="résultat">`;
        const dl = $("dl"); dl.href = url; dl.style.display = "block";
      } catch (e) {
        stage.innerHTML = `<div style="color:#c66">Erreur : ${e.message}</div>`;
      } finally {
        $("go").disabled = false; $("go").textContent = "Appliquer";
      }
    });

    renderParams();
  </script>
</body>
</html>
